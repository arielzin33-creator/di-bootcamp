<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise_XP</title>
</head>

<body>
    <script>
        //Exercise 1 : Location
        const person = {
            name: 'John Doe',
            age: 25,
            location: {
                country: 'Canada',
                city: 'Vancouver',
                coordinates: [49.2827, -123.1207]
            }
        }

        const {
            name,
            location: {
                country,
                city,
                coordinates: [lat, lng]
            }
        } = person;

        console.log(`I am ${name} from ${city}, ${country}. Latitude(${lat}), Longitude(${lng})`);

        // The output will be: "I am John Doe from Vancouver, Canada. Latitude(49.2827), Longitude(-123.1207)""

        //Exercise 2: Display Student Info
        function displayStudentInfo({
            first,
            last
        }) {
            //destructuring
            return `Your full name is ${first} ${last}`
        }

        // displayStudentInfo({
        //     first: 'Elie',
        //     last: 'Schoppik'
        // });
        console.log(displayStudentInfo({
            first: 'Elie',
            last: 'Schoppik'
        }));
        //output : 'Your full name is Elie Schoppik'

        //🌟 Exercise 3: User & id
        const users = {
            user1: 18273,
            user2: 92833,
            user3: 90315
        }

        // Part 1 - Object to array
        const usersArray = Object.entries(users);
        console.log(usersArray)

        //Excepted output: [
        //     ['user1', 18273],
        //     ['user2', 92833],
        //     ['user3', 90315]
        // ]

        // Part 2
        const doubleUser = Object.entries(users).map(([user, ID]) => ([user, ID * 2]))
        console.log(doubleUser)

        // Excepted output: [
        //     ['user1', 36546],
        //     ['user2', 185666],
        //     ['user3', 180630]
        // ]

        //Exercise 4 : Person class

        class Person {
            constructor(name) {
                this.name = name;
            }
        }

        const member = new Person('John');
        console.log(typeof member);

        // The output will be Object

        //Exercise 5 : Dog class

        class Dog {
            constructor(name) {
                this.name = name;
            }
        };

        // 2 - the correct class to extend the dog class
        class Labrador extends Dog {
            constructor(name, size) {
                super(name);
                this.size = size;
            }
        };

        // Exercise 6 : Challenges
        //Evaluate these (ie True or False)

        //[2] === [2]  : False
        //{} === {}    :False

        //What is, for each object below, the value of the property number and why?

        const object1 = {
            number: 5
        }; // new object created in memory
        const object2 = object1; // object2 points to the SAME address as object1
        const object3 = object2; // object3 points to the SAME address as object2 (= object1)
        const object4 = {
            number: 5
        }; // brand new object created at a DIFFERENT address

        object1.number = 4;
        console.log(object2.number) // 4 → same reference as object1
        console.log(object3.number) // 4 → same reference as object1
        console.log(object4.number) // 5 → completely separate object, untouched

        class animal {
            constructor(name,
                type,
                color) {
                this.name = name, this.type = type, this.color = color
            }
        }

        class Mammal extends animal {
            constructor(name, type, color) {
                super(name, type, color)
            }
            sound(animalSound) {
                return `${animalSound} I'm a ${this.type}, named ${this.name} and I'm ${this.color}`
            }
        }

        const farmerCow = new Mammal('Lily', 'cow', 'brown and white');
        console.log(farmerCow.sound('Moooo'));
    </script>
</body>

</html>
