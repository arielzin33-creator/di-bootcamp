<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Challenge Go Wildcats</title>
</head>

<body>
    <Script>
        const gameInfo = [{
            username: "john",
            team: "red",
            score: 5,
            items: ["ball", "book", "pen"]
        }, {
            username: "becky",
            team: "blue",
            score: 10,
            items: ["tape", "backpack", "pen"]
        }, {
            username: "susy",
            team: "red",
            score: 55,
            items: ["ball", "eraser", "pen"]
        }, {
            username: "tyson",
            team: "green",
            score: 1,
            items: ["book", "pen"]
        }, ];

        const usernames = []
        gameInfo.forEach((player) => {
            usernames.push(`${player.username}!`);
        });
        console.log(usernames);

        const winners = []
        gameInfo.forEach((player) => {
            if (player.score > 5) {
                winners.push(`${player.username}`)
            };
        });
        console.log(winners);

        const totalScore = gameInfo.reduce((acc, val) => {

            return acc + val.score
        }, 0)
        console.log(totalScore)
    </Script>
</body>

</html>
