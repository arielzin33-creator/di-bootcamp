<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise_XP</title>
</head>

<body>

    <!-- Exercise 1 : HTML Form -->

    <form method="GET" action="Exercise_XP.html">
        <p>Name: <input type="text" name="name"></p>
        <p>Comment:<br><textarea name="comment"></textarea></p>
        <p><button type="submit">Send</button></p>
    </form>
    <!-- The data appears in the URL (address bar), appended as a query string-->

    <!--Exercise 2 : HTML Form #2-->

    <form method="POST" action="Exercise_XP.html">
        <p>Name: <input type="text" name="name"></p>
        <p>Comment:<br><textarea name="comment"></textarea></p>
        <p><button type="submit">Send</button></p>
    </form>
    <!--If it is POST, the information is sent to the server as part of the data body and will not be visible in the URL box-->

    <!-- Exercise 3 : JSON Mario-->
    <script>
        const marioGame = {
            detail: "An amazing game!",
            characters: {
                mario: {
                    description: "Small and jumpy. Likes princesses.",
                    height: 10,
                    weight: 3,
                    speed: 12,
                },
                bowser: {
                    description: "Big and green, Hates princesses.",
                    height: 16,
                    weight: 6,
                    speed: 4,
                },
                princessPeach: {
                    description: "Beautiful princess.",
                    height: 12,
                    weight: 2,
                    speed: 2,
                }
            },
        }
        let jsonmarioGame = JSON.stringify(marioGame, null, 2)
        console.log(jsonmarioGame)
            //Nested objects structure is serialized into one flat string
    </script>
</body>

</html>
